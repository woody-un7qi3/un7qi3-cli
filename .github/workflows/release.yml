name: release

# vX.Y.Z 태그를 push 하면 GoReleaser 가 빌드·릴리즈한다.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # 릴리즈 생성에 필요 (추가 시크릿 없이 GITHUB_TOKEN 사용)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # changelog/태그 비교를 위해 전체 히스토리

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
