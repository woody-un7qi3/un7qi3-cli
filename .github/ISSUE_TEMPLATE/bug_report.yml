name: 버그 리포트
description: 동작이 기대와 다른 문제를 신고합니다
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: 무슨 일이 일어났나요?
      description: 기대한 동작과 실제 동작을 적어주세요.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 재현 방법
      placeholder: |
        1. uq logs forceteller-api kr ...
        2. ...
        3. 에러/잘못된 출력
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: uq 버전
      description: "`uq version` 출력"
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: 환경
      description: OS / 칩(arm64·amd64) / 관련 도구 버전 등
    validations:
      required: false
