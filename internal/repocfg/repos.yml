# 레포별 메타데이터.
#
# repos: 각 키는 GitHub 레포 이름. 값은 `uq repo pull` 이 순회할 브랜치 배열.
#        첫 번째 = primary. 풀이 끝나면 원래 브랜치로 복귀하지만, 명령 안에서
#        primary가 기준 역할을 한다.
# defaults: 위 매핑에 없는 레포의 fallback 브랜치 목록.
# runs:   `uq run <repo>[:profile]` 이 띄울 로컬 실행 프로파일.
#         현재 체크아웃된 브랜치는 건드리지 않는다 — release/x.y, feature/...
#         어디서든 그대로 실행한다. cmd 는 셸 해석 없이 argv 그대로.
#
# 추가/수정: 이 파일을 편집하고 `make install` 로 재빌드하면 즉시 반영.

repos:
  forceteller-api: [develop, master]
  forceteller-admin: [develop, master]
  forceteller-app: [main]

defaults: [main]

runs:
  forceteller-app:
    default: app3
    profiles:
      app:
        # React 18 + Ionic React 7 + Vite 5 → node 18+ 필요(Vite 5 는 16 미지원).
        # ">=18" 로 두어 팀원이 가진 18/20/22 중 활성 node(보통 nvm/fnm default)를
        # 그대로 쓴다. 18+ 이면 yarn 4.5 게이트도 통과하므로 YARN_IGNORE_NODE 불필요.
        desc: "en"
        cmd: ["yarn", "start"] # ionic serve -p 3000 --project=app
        node: ">=18"
        url: "http://localhost:3000"
      app3:
        desc: "kr, jp"
        cmd: ["yarn", "start:app3"] # ionic serve -c dev -p 3100 --project=app3
        node: "16"
        url: "http://localhost:3100"
        env:
          YARN_IGNORE_NODE: "1"
        # 실행 전 로케일(kr/jp)을 고르고 그 블록의 API 서버를 원격↔로컬로 토글한다
        # (env.dev.ts 직접 수정). anchor 로 블록을 한정해, 둘 다 localhost 여도 해당
        # 로케일 줄만 정확히 바뀐다.
        switches:
          - name: "API 서버"
            file: "projects/forceteller-app3/src/environments/env.dev.ts"
            scopes:
              - label: "kr"
                anchor: "kr: {"
                options:
                  - { label: "개발 (https://api-dev.gc.forceteller.com)", match: "apiUrl: 'https://api-dev.gc.forceteller.com'" }
                  - { label: "로컬 (9200)", match: "apiUrl: 'http://localhost:9200'" }
                  - { label: "포트 입력", match: "apiUrl: 'http://localhost:{port}'", default: "9200" }
              - label: "jp"
                anchor: "jp: {"
                options:
                  - { label: "개발 (https://api-dev.gc.forceteller.jp)", match: "apiUrl: 'https://api-dev.gc.forceteller.jp'" }
                  - { label: "로컬 (9200)", match: "apiUrl: 'http://localhost:9200'" }
                  - { label: "포트 입력", match: "apiUrl: 'http://localhost:{port}'", default: "9200" }

  forceteller-admin:
    default: local
    profiles:
      local:
        node: "16"
        # 국가는 프로파일과 직교하는 축 — proc 구조를 복제하지 않고 {script} 토큰
        # 치환으로 표현한다. back/front 가 같은 스크립트 이름을 공유하는 전제.
        countries:
          default: kr
          options:
            - code: kr
              script: local
              requires: [back-end/.env]
            - code: en
              script: local_en
              requires: [back-end/.env.en]
            - code: jp
              script: local_jp
              requires: [back-end/.env.jp]
        procs:
          - name: back
            cwd: back-end
            cmd: ["npm", "run", "{script}"]   # {script} ← 선택 국가로 치환
            url: "http://localhost:3000"
          - name: front
            cwd: front-end/workspace
            cmd: ["npm", "run", "{script}"]
            url: "http://localhost:4200"

# logs: `uq log <대상>` allowlist. 키는 GitHub repo 가 아니어도 되며(논리적 식별자),
#       국가별 EB application + region 을 선언한다.
#       환경(beta/prod)·인스턴스는 aws 로 실시간 발견하므로 적지 않는다.
logs:
  forceteller-api:
    path: /var/log/web.stdout.log
    countries:
      kr: { app: kr-forceteller-api, region: ap-northeast-2 }
      en: { app: en-forceteller-api, region: ap-southeast-1 }
      jp: { app: jp-forceteller-api, region: ap-northeast-1 }
  scala-api:
    path: /var/log/web.stdout.log
    countries:
      kr: { app: kr-app, region: ap-northeast-2 }
      en: { app: en-app, region: ap-southeast-1 }
      jp: { app: jp-app, region: ap-northeast-1 }
  sangdam-api:
    path: /var/log/web.stdout.log
    countries:
      kr: { app: kr-sangdam-api, region: ap-northeast-2 }
  external-api:
    path: /var/log/web.stdout.log
    countries:
      kr: { app: kr-external-api, region: ap-northeast-2 }
