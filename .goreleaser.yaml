# GoReleaser 설정 — 태그 push 시 GitHub Actions 가 실행한다.
# 릴리즈 대상 레포는 명시하지 않고 git 원격에서 추론한다(회사 계정 이전 시 origin 만 변경).
version: 2

project_name: uq

builds:
  - id: uq
    main: ./cmd/uq
    binary: uq
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    # internal/version 변수 주입 — Makefile 의 ldflags 와 동일 매핑.
    ldflags:
      - -X github.com/un7qi3inc/un7qi3-cli/internal/version.Version={{ .Version }}
      - -X github.com/un7qi3inc/un7qi3-cli/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/un7qi3inc/un7qi3-cli/internal/version.Date={{ .Date }}

# raw 바이너리로 발행 — uq upgrade 가 tar 해제 없이 그대로 받아 교체한다.
# 에셋 이름은 assetName(GOOS,GOARCH) = uq_<os>_<arch> 와 일치해야 한다.
archives:
  - id: uq
    formats:
      - binary
    name_template: "uq_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# release-please 가 만든 한글 CHANGELOG 가 릴리즈 본문의 정본이다.
# GoReleaser 는 changelog 를 따로 만들지 않아 raw 커밋 목록이 덧붙지 않게 한다.
changelog:
  disable: true

release:
  # owner/name 미지정 → 원격에서 추론.
  # release-please 가 먼저 릴리즈를 만들므로, GoReleaser 는 새로 만들지 않고
  # 그 릴리즈에 바이너리만 덧붙인다(중복 릴리즈 방지).
  mode: append
  draft: false
  prerelease: auto
